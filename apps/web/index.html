<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ══════════════════════════════════════
         SEO — Primary
    ══════════════════════════════════════ -->
    <title>Cashflow — 个人收支追踪 · 日均预算 · 收入投资消费管理</title>
    <meta name="description"
          content="Cashflow 帮你可视化个人现金流：追踪收入、投资与消费，自动计算日均可用预算，掌握每月真实结余。支持 Google 账号登录，数据私有存储在 Cloudflare。" />
    <meta name="keywords"
          content="cashflow,现金流,日均预算,个人理财,收入追踪,投资管理,消费分析,cash flow,personal finance,budget tracker,家計簿" />
    <meta name="author" content="Cashflow" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://cashflow.soniclab.cc/" />

    <!-- ══════════════════════════════════════
         Open Graph
    ══════════════════════════════════════ -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://cashflow.soniclab.cc/" />
    <meta property="og:site_name"   content="Cashflow" />
    <meta property="og:title"       content="Cashflow — 个人收支追踪与日均预算" />
    <meta property="og:description" content="可视化收入、投资与消费，自动计算日均可用预算。Google 账号登录，数据完全私有。" />
    <meta property="og:image"       content="https://cashflow.soniclab.cc/og-image.svg" />

    <meta property="og:image:alt"   content="Cashflow 应用预览" />
    <meta property="og:locale"      content="zh_CN" />

    <!-- ══════════════════════════════════════
         Twitter / X Card
    ══════════════════════════════════════ -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Cashflow — 个人收支追踪与日均预算" />
    <meta name="twitter:description" content="可视化收入、投资与消费，自动计算日均可用预算。Google 账号登录，数据完全私有。" />
    <meta name="twitter:image"       content="https://cashflow.soniclab.cc/og-image.svg" />

    <!-- ══════════════════════════════════════
         PWA / 安装到桌面
    ══════════════════════════════════════ -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#C0502F" />
    <meta name="apple-mobile-web-app-capable"          content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title"            content="Cashflow" />
    <link rel="apple-touch-icon"             href="/icon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon.svg" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />

    <!-- ══════════════════════════════════════
         JSON-LD 结构化数据
    ══════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Cashflow",
      "alternateName": ["现金流", "キャッシュフロー"],
      "url": "https://cashflow.soniclab.cc",
      "description": "Personal cash flow tracker — visualize income, investments and expenses, calculate daily available budget",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Web, iOS, Android",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "JPY"
      },
      "inLanguage": ["zh-CN", "ja"],
      "author": {
        "@type": "Person",
        "name": "sanuei"
      },
      "featureList": [
        "Income tracking",
        "Investment management",
        "Expense analysis",
        "Daily budget calculation",
        "Cash flow trends",
        "PWA offline support",
        "Multi-theme UI"
      ]
    }
    </script>

    <!-- ══════════════════════════════════════
         字体：Space Grotesk（Logo 用）+ Fraunces + Inter
    ══════════════════════════════════════ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Fraunces:opsz,wght,SOFT@9..144,300..700,0..100&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- 主题初始化：同步执行，避免 FOUC -->
    <script>
      (function(){try{var t=localStorage.getItem('cfp-theme')||'warm';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
