<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── PWA / 安装到桌面 ── -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Android / Chrome: 主题色 -->
    <meta name="theme-color" content="#0075de" />

    <!-- iOS Safari: 允许全屏独立运行（隐藏浏览器 UI） -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="现金流" />

    <!-- iOS 桌面图标（各尺寸） -->
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon.svg" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icon.svg" />

    <!-- 通用图标 -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />

    <!-- ── 应用信息 ── -->
    <title>Cash Flow Pulse</title>
    <meta name="description" content="个人现金流可视化 · 日均可用预算" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- ── 字体 ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
