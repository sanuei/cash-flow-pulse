<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="iconbg" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <radialGradient id="iconglow" cx="50%" cy="44%" r="52%">
      <stop offset="0%"   stop-color="#60a5fa" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
    <!-- 装饰用网格渐变 -->
    <linearGradient id="gridfade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#334155" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#334155" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 装饰：右侧点阵 -->
  <g fill="#60a5fa" opacity="0.08">
    <circle cx="780" cy="80"  r="3"/><circle cx="840" cy="80"  r="3"/><circle cx="900" cy="80"  r="3"/><circle cx="960" cy="80"  r="3"/><circle cx="1020" cy="80" r="3"/><circle cx="1080" cy="80" r="3"/><circle cx="1140" cy="80" r="3"/>
    <circle cx="780" cy="140" r="3"/><circle cx="840" cy="140" r="3"/><circle cx="900" cy="140" r="3"/><circle cx="960" cy="140" r="3"/><circle cx="1020" cy="140" r="3"/><circle cx="1080" cy="140" r="3"/><circle cx="1140" cy="140" r="3"/>
    <circle cx="780" cy="200" r="3"/><circle cx="840" cy="200" r="3"/><circle cx="900" cy="200" r="3"/><circle cx="960" cy="200" r="3"/><circle cx="1020" cy="200" r="3"/><circle cx="1080" cy="200" r="3"/><circle cx="1140" cy="200" r="3"/>
    <circle cx="780" cy="260" r="3"/><circle cx="840" cy="260" r="3"/><circle cx="900" cy="260" r="3"/><circle cx="960" cy="260" r="3"/><circle cx="1020" cy="260" r="3"/><circle cx="1080" cy="260" r="3"/><circle cx="1140" cy="260" r="3"/>
    <circle cx="780" cy="320" r="3"/><circle cx="840" cy="320" r="3"/><circle cx="900" cy="320" r="3"/><circle cx="960" cy="320" r="3"/><circle cx="1020" cy="320" r="3"/><circle cx="1080" cy="320" r="3"/><circle cx="1140" cy="320" r="3"/>
    <circle cx="780" cy="380" r="3"/><circle cx="840" cy="380" r="3"/><circle cx="900" cy="380" r="3"/><circle cx="960" cy="380" r="3"/><circle cx="1020" cy="380" r="3"/><circle cx="1080" cy="380" r="3"/><circle cx="1140" cy="380" r="3"/>
    <circle cx="780" cy="440" r="3"/><circle cx="840" cy="440" r="3"/><circle cx="900" cy="440" r="3"/><circle cx="960" cy="440" r="3"/><circle cx="1020" cy="440" r="3"/><circle cx="1080" cy="440" r="3"/><circle cx="1140" cy="440" r="3"/>
    <circle cx="780" cy="500" r="3"/><circle cx="840" cy="500" r="3"/><circle cx="900" cy="500" r="3"/><circle cx="960" cy="500" r="3"/><circle cx="1020" cy="500" r="3"/><circle cx="1080" cy="500" r="3"/><circle cx="1140" cy="500" r="3"/>
    <circle cx="780" cy="560" r="3"/><circle cx="840" cy="560" r="3"/><circle cx="900" cy="560" r="3"/><circle cx="960" cy="560" r="3"/><circle cx="1020" cy="560" r="3"/><circle cx="1080" cy="560" r="3"/><circle cx="1140" cy="560" r="3"/>
  </g>

  <!-- 装饰：右下折线图 -->
  <polyline
    points="760,520 820,480 880,495 940,440 1000,460 1060,400 1120,380 1180,340"
    fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  <polyline
    points="760,560 820,545 880,555 940,520 1000,530 1060,500 1120,488 1180,460"
    fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.25"/>

  <!-- 左侧 App 图标 (200×200) -->
  <g transform="translate(80, 215)">
    <rect width="200" height="200" rx="42" fill="url(#iconbg)"/>
    <rect width="200" height="200" rx="42" fill="url(#iconglow)"/>
    <!-- 小版 ¥（坐标按 200×200 缩放） -->
    <g fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round" stroke-width="20">
      <polyline points="42,31 100,98 158,31"/>
      <line x1="100" y1="98" x2="100" y2="168"/>
      <line x1="62"  y1="122" x2="138" y2="122"/>
      <line x1="62"  y1="145" x2="138" y2="145"/>
    </g>
  </g>

  <!-- 竖分隔线 -->
  <line x1="326" y1="200" x2="326" y2="430" stroke="#334155" stroke-width="1.5"/>

  <!-- App 名称 -->
  <text x="366" y="282"
    font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif"
    font-size="64" font-weight="700" fill="white" letter-spacing="-1">
    Cash Flow Pulse
  </text>

  <!-- 副标题 -->
  <text x="366" y="338"
    font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif"
    font-size="30" fill="#94a3b8" letter-spacing="0.5">
    个人现金流可视化 · 日均预算追踪
  </text>

  <!-- 公式 -->
  <rect x="366" y="368" width="380" height="46" rx="8" fill="#1e3a8a" opacity="0.6"/>
  <text x="556" y="397"
    font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif"
    font-size="22" fill="#93c5fd" text-anchor="middle" letter-spacing="2">
    收入 − 投资 = 消费
  </text>

  <!-- 三个功能标签 -->
  <g font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif" font-size="18" fill="#64748b">
    <rect x="366" y="430" width="100" height="32" rx="6" fill="#1e293b"/>
    <text x="416" y="451" text-anchor="middle" fill="#60a5fa">收入管理</text>
    <rect x="480" y="430" width="100" height="32" rx="6" fill="#1e293b"/>
    <text x="530" y="451" text-anchor="middle" fill="#60a5fa">投资追踪</text>
    <rect x="594" y="430" width="100" height="32" rx="6" fill="#1e293b"/>
    <text x="644" y="451" text-anchor="middle" fill="#60a5fa">消费分析</text>
  </g>

  <!-- 域名 -->
  <text x="366" y="510"
    font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif"
    font-size="22" fill="#475569" letter-spacing="0.5">
    cashflow.soniclab.cc
  </text>
</svg>
