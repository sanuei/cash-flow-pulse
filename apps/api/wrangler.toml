name = "cash-flow-pulse-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# D1 数据库绑定
# 首次部署前需要先创建 D1 实例：
#   wrangler d1 create cash-flow-pulse-db
# 然后将生成的 database_id 填到下方
[[d1_databases]]
binding = "DB"
database_name = "cash-flow-pulse-db"
database_id = "REPLACE_WITH_REAL_ID"

# 环境变量
[vars]
ALLOWED_ORIGIN = "http://localhost:5173"